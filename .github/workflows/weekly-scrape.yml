name: 每週四自動抓 Kobo 99 書單

on:
  schedule:
    # 每週四 02:00 UTC = 台灣時間 10:00
    # 失敗會每小時重試最多 4 次，覆蓋到 13:00
    - cron: "0 2 * * 4"

  # 也可以手動觸發（測試用）
  workflow_dispatch:
    inputs:
      year:
        description: "年份（留空 = 本週）"
        required: false
      week:
        description: "週次（留空 = 本週）"
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許 commit 回 repo

    steps:
      - name: Checkout 專案
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: 安裝 Python 套件
        run: pip install -r scraper/requirements.txt

      - name: 安裝 Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: 執行爬蟲（含重試，每小時一次最多 4 次）
        run: |
          YEAR="${{ github.event.inputs.year }}"
          WEEK="${{ github.event.inputs.week }}"
          MAX=4
          for i in $(seq 1 $MAX); do
            echo "=== 第 $i 次嘗試 ==="
            if [ -n "$YEAR" ] && [ -n "$WEEK" ]; then
              python scraper/scrape.py $YEAR $WEEK && break
            else
              python scraper/scrape.py && break
            fi
            if [ $i -lt $MAX ]; then
              echo "⏳ 部落格文章尚未發佈，等待 60 分鐘後重試…"
              sleep 3600
            else
              echo "❌ 已達最大重試次數，放棄"
              exit 1
            fi
          done

      - name: 確認是否有新資料
        id: check
        run: |
          if git diff --quiet docs/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 驗證 JSON 格式
        if: steps.check.outputs.changed == 'true'
        run: python -c "import json,sys; json.load(open('docs/data/latest.json',encoding='utf-8')); print('JSON OK')"

      - name: 更新 sitemap lastmod
        if: steps.check.outputs.changed == 'true'
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
            echo '  <url>'
            echo '    <loc>https://kobo99.com/</loc>'
            echo "    <lastmod>${TODAY}</lastmod>"
            echo '    <changefreq>weekly</changefreq>'
            echo '    <priority>1.0</priority>'
            echo '  </url>'
            echo '</urlset>'
          } > docs/sitemap.xml

      - name: Commit & Push 新書單
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "kobo99-bot"
          git config user.email "bot@kobo99-tracker.local"
          git add docs/data/ docs/covers/ docs/sitemap.xml docs/calendar.ics
          WEEK_NUM=$(python -c "from datetime import datetime,timezone,timedelta; now=datetime.now(timezone(timedelta(hours=8))); print(now.isocalendar().week)")
          git commit -m "📚 更新 W${WEEK_NUM} 書單 $(date +'%Y-%m-%d')"
          git push
